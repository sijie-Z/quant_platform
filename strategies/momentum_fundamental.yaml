# Momentum + Fundamental Strategy
# Combines price momentum factors with quality fundamental factors.
name: momentum_fundamental
description: "Momentum + quality fundamental factor combination, equal-weight portfolio"
version: "1.0.0"
author: "default"
created_at: "2026-06-19"
tags:
  - momentum
  - fundamental
  - equal_weight

universe:
  type: default
  n_stocks: 300
  exclude_st: true

factors:
  - {name: momentum_12m, weight: 0.25}
  - {name: momentum_6m, weight: 0.15}
  - {name: roe, weight: 0.20}
  - {name: volatility_60d, weight: -0.15}
  - {name: turnover_20d, weight: 0.10}
  - {name: pb_ratio, weight: 0.15}

portfolio:
  method: equal_weight
  rebalance_frequency: monthly
  max_position_weight: 0.05
  cash_buffer: 0.05

risk:
  max_drawdown: 0.25
  max_turnover: 5.0

execution:
  slippage_bps: 10

validation:
  minimum_ic: 0.02
  minimum_walk_forward_folds: 3
