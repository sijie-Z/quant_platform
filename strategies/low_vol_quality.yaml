# Low Volatility + Quality Strategy
# Focuses on low volatility stocks with high quality scores.
name: low_vol_quality
description: "Low volatility + quality stock selection with risk parity"
version: "1.0.0"
author: "default"
created_at: "2026-06-19"
tags:
  - low_vol
  - quality
  - risk_parity

universe:
  type: default
  n_stocks: 200
  exclude_st: true

factors:
  - {name: volatility_20d, weight: -0.30}
  - {name: volatility_60d, weight: -0.20}
  - {name: roe, weight: 0.25}
  - {name: asset_growth, weight: 0.15}
  - {name: turnover_20d, weight: -0.10}

portfolio:
  method: risk_parity
  rebalance_frequency: monthly
  max_position_weight: 0.04
  cash_buffer: 0.03

risk:
  max_drawdown: 0.20
  max_turnover: 3.0

execution:
  slippage_bps: 8

validation:
  minimum_ic: 0.015
  minimum_walk_forward_folds: 4
