name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff==0.15.12 mypy==1.14.1

      - name: Make quant_platform importable
        run: |
          ln -s "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/../quant_platform"
          echo "PYTHONPATH=$GITHUB_WORKSPACE/.." >> "$GITHUB_ENV"

      - name: Lint with ruff
        continue-on-error: true
        run: ruff check . --output-format=concise || true

      - name: Type check with mypy
        continue-on-error: true
        run: mypy quant_platform/ --config-file=pyproject.toml

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [test, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t quant-platform:latest .

      - name: Verify container starts
        run: |
          docker run -d --name test-container -p 8000:8000 quant-platform:latest
          sleep 5
          curl -f http://localhost:8000/api/health || exit 1
          docker stop test-container
